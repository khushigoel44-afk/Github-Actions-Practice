name: multi-job

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on:self-hosted
        steps:
            - name: prints "Building the app"
              run: echo "Building the app"

    test:
        runs-on:self-hosted
        needs: [build]
        steps:
            - name: prints "Running tests"
              run: echo "Running tests"

    deploy:
        runs-on:self-hosted
        needs: [test]
        steps:
            - name: prints "Deploying"
              run: echo "Deploying"
