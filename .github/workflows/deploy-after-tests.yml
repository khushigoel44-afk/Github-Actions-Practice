name: deploy-after-tests

on:
    workflow_run:
        workflows: ["tests"]
        types:
            - completed

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Check if the workflow_run file failed or not 
              if: github.event.workflow_run.conclusion != "success"
              run: echo "The workflow_run file failed due to some error!"

            - name: Check if the workflow_run file failed or not
              if: github.event.workflow_run.conclusion == "success"
              run: echo "The workflow_run file ran Successfully!"

