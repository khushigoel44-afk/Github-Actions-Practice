name: call-build

on: 
    push:
        branches: [main]

jobs:
    caller_workflow:
        uses: ./.github/workflows/reusable-build.yml
        with:
            app_name: "My-new-app"
            environment: "production"
        secrets:
            docker_token: ${{ secrets.PASSWORD }}

    print_workflow:
        runs-on: ubuntu-latest
        needs: caller_workflow
        steps:
            - name: Print the output
              run: echo "The final output is ${{ needs.caller_workflow.outputs.build_version }}"
